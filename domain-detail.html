/* ── ASCII art generator — generates a topographic-style ASCII pattern ── */
function useAsciiArt(seed = 0, rows = 36, cols = 110) {
  return useMemo(() => {
    const chars = ' ·.·:-=+*#%@';
    let out = '';
    for (let r = 0; r < rows; r++) {
      let line = '';
      for (let c = 0; c < cols; c++) {
        // Layered sine waves create flowing topographic feel
        const v =
          Math.sin((c + seed * 3) * 0.08) * 0.5 +
          Math.sin((r + seed * 2) * 0.15 + c * 0.03) * 0.3 +
          Math.cos((c - r) * 0.04 + seed) * 0.2;
        const t = (v + 1) / 2; // 0..1
        const idx = Math.max(0, Math.min(chars.length - 1, Math.floor(t * chars.length)));
        line += chars[idx];
      }
      out += line + '\n';
    }
    return out;
  }, [seed, rows, cols]);
}

          transition: 'color 0.2s',
        }}
          onMouseEnter={e => e.currentTarget.style.color = T.ink}
          onMouseLeave={e => e.currentTarget.style.color = T.inkMid}
        >View detailed list →</a>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${REAL_VENTURES.length}, 1fr)`, borderTop: `1px solid ${T.border}` }}>
        {REAL_VENTURES.map((v, i) => (
          <a key={v.id} href={v.href} style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            minHeight: '220px',
            borderRight: i < REAL_VENTURES.length - 1 ? `1px solid ${T.border}` : 'none',
            padding: '40px 32px',
            cursor: 'pointer', transition: 'background 0.2s',
            textDecoration: 'none',
          }}
            onMouseEnter={e => e.currentTarget.style.background = T.ivory}
            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}

            <div style={{ height: '72px', width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {v.logo ? (
                <img src={v.logo} alt={v.name} style={{ maxHeight: '52px', maxWidth: '170px', width: 'auto', objectFit: 'contain' }} />

                <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: '34px', letterSpacing: '0.01em', color: T.ink, lineHeight: 1 }}>{v.name}</span>
              )}
            </div>
          </a>
        ))}
      </div>
    </section>
  );
}

/* ── Blog posts ── */
const DOMAIN_TAGS = { fintech: 'FinTech', blockchain: 'FinTech', ai: 'AI & Data', foodtech: 'FoodTech', healthtech: 'HealthTech', commerce: 'Commerce', market: 'Manifesto' };
function DomainPosts({ domain }) {
  const all = window.INSIGHTS || [];
  const tag = DOMAIN_TAGS[domain.id] || 'Manifesto';
  let picks = all.filter(p => p.tag === tag);
  if (picks.length < 2) picks = picks.concat(all.filter(p => p.tag !== tag));
  picks = picks.slice(0, 2);
  const photos = [
    'uploads/gerrit-vermeulen.jpg',
    'uploads/connor-mcsheffrey.jpg',
    'uploads/anders-jilden.jpg',
  ];
  return (
    <section style={{ background: T.ivory, borderBottom: `1px solid ${T.border}` }}>
      <div style={{ padding: '64px 48px 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
        <div>
          <Label>Insights</Label>
          <h2 style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 'clamp(32px, 4vw, 52px)', lineHeight: 0.95, letterSpacing: '-0.01em', textTransform: 'uppercase', color: T.ink }}>
            Relevant<br />reading.
          </h2>
        </div>
        <a href="insights.html" style={{
          fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 600,
          fontSize: '12px', letterSpacing: '0.14em', textTransform: 'uppercase',
          color: T.inkMid, borderBottom: `1px solid ${T.border}`, paddingBottom: '3px',
          transition: 'color 0.2s',
        }}
          onMouseEnter={e => e.currentTarget.style.color = T.ink}
          onMouseLeave={e => e.currentTarget.style.color = T.inkMid}

      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '1px', background: T.border, padding: '32px 48px 64px' }}>
        {picks.map((p, idx) => {
          const photo = photos[idx % photos.length];
          return (
            <a key={p.slug} href={`insight-detail.html?slug=${p.slug}`} style={{
              display: 'grid', gridTemplateColumns: '200px 1fr', gap: '0',
              background: T.ivory,
              cursor: 'pointer', transition: 'background 0.2s',
              textDecoration: 'none',
            }}
              onMouseEnter={e => e.currentTarget.style.background = T.ivory2}
              onMouseLeave={e => e.currentTarget.style.background = T.ivory}
            >
              <div style={{ position: 'relative', height: '100%', minHeight: '180px', overflow: 'hidden' }}>
                <img src={photo} alt="" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', filter: 'grayscale(15%)' }} />
              </div>
              <div style={{ padding: '28px 32px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
                <div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '14px' }}>
                    <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', letterSpacing: '0.12em', textTransform: 'uppercase', color: T.accent }}>{p.tag}</span>
                    <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', color: T.inkLight }}>{p.readTime} read</span>
                  </div>
                  <h3 style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: '20px', letterSpacing: '0.02em', textTransform: 'uppercase', lineHeight: 1.15, color: T.ink, marginBottom: '12px', textWrap: 'pretty' }}>{p.title}</h3>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', color: T.inkLight, letterSpacing: '0.1em' }}>{p.date}</span>
                  <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', letterSpacing: '0.12em', textTransform: 'uppercase', color: T.inkLight }}>Read →</span>
                </div>
              </div>
            </a>
          );
        })}
      </div>
    </section>
  );
}

/* ── Main page ── */
function DomainDetailPage() {
  const id = (() => {
    try {
      const p = new URLSearchParams(window.location.search);
      return p.get('id') || 'fintech';
    } catch (e) { return 'fintech'; }
  })();
  const domain = domainsData[id] || domainsData.fintech;
  const seed = Object.keys(domainsData).indexOf(id);

  return (
    <>
      <Nav activePage="Domains" />
      <DomainHero domain={{ ...domain, id }} seed={seed} />
      <DomainBody domain={domain} />
      <DomainVentures domain={{ ...domain, id }} />
      <DomainPosts domain={{ ...domain, id }} />

      {/* CTA */}
      <section style={{ background: T.ink, padding: '80px 48px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <Label light>Co-build with us</Label>
            <h2 style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 'clamp(36px, 4.5vw, 56px)', lineHeight: 0.95, letterSpacing: '-0.01em', textTransform: 'uppercase', color: '#f2ede4' }}>Have a venture in<br />{domain.short}?</h2>
          </div>
          <a href="index.html#contact" style={{
            fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: '13px', letterSpacing: '0.14em', textTransform: 'uppercase',
            border: '1px solid rgba(242,237,228,0.4)', color: '#f2ede4', padding: '14px 28px',
            transition: 'all 0.2s', display: 'inline-block', flexShrink: 0,
          }}
            onMouseEnter={e => { e.currentTarget.style.background = '#f2ede4'; e.currentTarget.style.color = T.ink; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = '#f2ede4'; }}
          >Start a conversation</a>
        </div>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DomainDetailPage />);
</script>
<div id="root"></div>

<script>
(function() {
  // Inject hamburger toggle once DOM is ready
  function initMobileNav() {
    var nav = document.querySelector('nav');
    if (!nav || nav.dataset.mobileInit) return;
    nav.dataset.mobileInit = '1';
    var links = nav.querySelector('div:last-child');
    if (!links) return;
    links.classList.add('mobile-nav-links');
    var btn = document.createElement('button');
    btn.className = 'mobile-nav-toggle';
    btn.setAttribute('aria-label', 'Menu');
    btn.innerHTML = '<span></span><span></span><span></span>';
    btn.addEventListener('click', function() {
      links.classList.toggle('open');
    });
    // insert button before the links div
    nav.insertBefore(btn, links);
    // close on link click
    links.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() { links.classList.remove('open'); });
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(initMobileNav, 800); });
  } else {
    setTimeout(initMobileNav, 800);
  }
})();
</script>

<script src="mobile-nav.js"></script>
</body>
