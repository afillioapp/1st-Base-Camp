function Label({ children, light }) {
  return (
    <div style={{
      fontFamily: "'DM Mono', monospace",
      fontSize: '10px', letterSpacing: '0.18em',

      {children}
    </div>);

}

/* ── SunIcon ── */
function SunIcon({ size = 48, color = T.inkLight }) {
  const rays = 12;
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" fill="none">
      {Array.from({ length: rays }, (_, i) => {
        const angle = i / rays * 2 * Math.PI;
        const r1 = 16,r2 = 22;
        const x1 = 24 + r1 * Math.cos(angle),y1 = 24 + r1 * Math.sin(angle);
        const x2 = 24 + r2 * Math.cos(angle),y2 = 24 + r2 * Math.sin(angle);
        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth="1.2" />;
      })}
      <circle cx="24" cy="24" r="10" stroke={color} strokeWidth="1.2" fill="none" />
    </svg>);

}

function App() {

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {

  return (
    <>
      <Nav scrolled={scrolled} />
      <Hero heroBg={tweaks.heroBg} />
      <ModelSection />
      <VenturesSection />
      <ServicesSection />
      <CredibilitySection />

          <TweakToggle label="Show intro subtitle" value={tweaks.showSubtitle} onChange={(v) => setTweak('showSubtitle', v)} />

      </TweaksPanel>
    </>);

}

(function() {
  // Inject hamburger toggle once DOM is ready
  function initMobileNav() {
    var nav = document.querySelector('nav');
    if (!nav || nav.dataset.mobileInit) return;
    nav.dataset.mobileInit = '1';
    var links = nav.querySelector('div:last-child');
    if (!links) return;
    links.classList.add('mobile-nav-links');
    var btn = document.createElement('button');
    btn.className = 'mobile-nav-toggle';
    btn.setAttribute('aria-label', 'Menu');
    btn.innerHTML = '<span></span><span></span><span></span>';
    btn.addEventListener('click', function() {
      links.classList.toggle('open');
    });
    // insert button before the links div
    nav.insertBefore(btn, links);
    // close on link click
    links.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() { links.classList.remove('open'); });
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(initMobileNav, 800); });
  } else {
    setTimeout(initMobileNav, 800);
  }
})();
</script>

<script src="mobile-nav.js"></script>
</body>
</html>
