<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights — 1st Base Camp</title>
<link rel="icon" type="image/png" sizes="32x32" href="brand/favicons/1bc-favicon-32.png">
<link rel="apple-touch-icon" href="brand/favicons/1bc-favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #f2ede4; color: #1a1814; font-family: 'Barlow', sans-serif; font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: #d4c9b0; }
  ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-track { background: #f2ede4; } ::-webkit-scrollbar-thumb { background: #c8c0b0; }
</style>
<style id="responsive">
  /* ── Mobile responsiveness ── */
  @media (max-width: 900px) {
    /* nav */
    nav { padding: 0 20px !important; }
    nav > div:last-child { display: none !important; }
    nav > a[href], nav > div:first-child { display: flex !important; }

    /* generic 2-col → 1-col grid */
    [style*="grid-template-columns: 1fr 1fr"],
    [style*="gridTemplateColumns: '1fr 1fr'"] {
      grid-template-columns: 1fr !important;
    }
    [style*="grid-template-columns: repeat(2"],
    [style*="gridTemplateColumns: 'repeat(2"] {
      grid-template-columns: 1fr !important;
    }
    [style*="grid-template-columns: repeat(3"],
    [style*="gridTemplateColumns: 'repeat(3"] {
      grid-template-columns: 1fr 1fr !important;
    }
    [style*="grid-template-columns: repeat(4"],
    [style*="gridTemplateColumns: 'repeat(4"] {
      grid-template-columns: 1fr 1fr !important;
    }
    /* hero text size */
    h1 { font-size: clamp(40px, 10vw, 80px) !important; }
    h2 { font-size: clamp(32px, 8vw, 64px) !important; }
    /* section padding */
    section, footer, nav { padding-left: 20px !important; padding-right: 20px !important; }
    /* hero full-height on mobile */
    section[style*="height: 100vh"] { min-height: 560px !important; }
  }

  @media (max-width: 600px) {
    [style*="grid-template-columns: repeat(3"],
    [style*="gridTemplateColumns: 'repeat(3"] {
      grid-template-columns: 1fr !important;
    }
    [style*="grid-template-columns: repeat(4"],
    [style*="gridTemplateColumns: 'repeat(4"] {
      grid-template-columns: 1fr 1fr !important;
    }
    [style*="padding: '72px 48px"],
    [style*="padding: '80px 48px"],
    [style*="padding: '120px 80px"],
    [style*="padding: '64px 48px"] {
      padding: 40px 20px !important;
    }
    /* Horizontal scrollers stay scrollable */
    .scroller { overflow-x: auto !important; }
  }

  /* Hamburger mobile nav */
  .mobile-nav-toggle {
    display: none;
  }
  @media (max-width: 900px) {
    .mobile-nav-toggle {
      display: flex !important;
      flex-direction: column;
      gap: 5px;
      padding: 8px;
      background: none;
      border: none;
      cursor: pointer;
      margin-left: auto;
    }
    .mobile-nav-toggle span {
      display: block;
      width: 24px;
      height: 1.5px;
      background: #1a1814;
    }
    .mobile-nav-links {
      display: none;
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      background: rgba(242,237,228,0.98);
      backdrop-filter: blur(12px);
      padding: 16px 20px;
      border-bottom: 1px solid #d4cdc0;
      flex-direction: column;
      gap: 0;
      z-index: 199;
    }
    .mobile-nav-links.open {
      display: flex;
    }
    .mobile-nav-links a {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1814;
      padding: 14px 0;
      border-bottom: 1px solid #d4cdc0;
      text-decoration: none;
    }
    .mobile-nav-links a:last-child { border-bottom: none; }
  }
</style>
<link rel="stylesheet" href="responsive.css">
</head>
<body>
<script src="insights-data.js"></script>
<script type="text/babel" src="shared.js?v=2"></script>
<script type="text/babel">
const PHOTOS = [
  'uploads/gerrit-vermeulen.jpg',
  'uploads/john-towner.jpg',
  'uploads/anders-jilden.jpg',
  'uploads/connor-mcsheffrey.jpg',
  'uploads/boris-stefanik.jpg',
  'uploads/claus-grunstaudl.jpg',
  'uploads/arto-marttinen.jpg',
  'uploads/chris-holgersson.jpg',
  'uploads/david-marcu.jpg',
  'uploads/photo_6.jpg',
  'uploads/photo_9.jpg',
  'uploads/photo_1.jpg',
];

const { useState } = React;
const posts = window.INSIGHTS || [];
const allTags = ['All', ...Array.from(new Set(posts.map(p => p.tag)))];

function InsightsPage() {
  const [filter, setFilter] = useState('All');
  const filtered = filter === 'All' ? posts : posts.filter(p => p.tag === filter);
  const featured = posts[0];
  const rest = filtered.filter(p => p.slug !== featured.slug);

  return (
    <>
      <Nav activePage="Insights" />

      {/* Header */}
      <section style={{ paddingTop: '60px', background: T.ivory }}>
        <div style={{ padding: '80px 48px 56px', borderBottom: `1px solid ${T.border}`, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '80px', alignItems: 'end' }}>
          <div>
            <Label>Knowledge</Label>
            <h1 style={{
              fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900,
              fontSize: 'clamp(60px, 8vw, 104px)', lineHeight: 0.9,
              letterSpacing: '-0.01em', textTransform: 'uppercase', color: T.ink,
            }}>Insights.</h1>
          </div>
          <div style={{ paddingBottom: '8px' }}>
            <p style={{ fontFamily: "'Barlow', sans-serif", fontWeight: 300, fontSize: '18px', lineHeight: 1.8, color: T.inkMid, borderLeft: `2px solid ${T.border}`, paddingLeft: '28px', marginBottom: '32px' }}>
              The thinking behind the venture studio: how markets change, where infrastructure is missing, and what discipline serious venture building requires.
            </p>
            <div style={{ paddingLeft: '30px', display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
              {allTags.map(t => (
                <button key={t} onClick={() => setFilter(t)} style={{
                  fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 600, fontSize: '12px', letterSpacing: '0.1em', textTransform: 'uppercase',
                  padding: '7px 16px',
                  border: `1px solid ${filter === t ? T.ink : T.border}`,
                  background: filter === t ? T.ink : 'transparent',
                  color: filter === t ? T.ivory : T.inkMid,
                  cursor: 'pointer', transition: 'all 0.2s',
                }}>{t}</button>
              ))}
            </div>
          </div>
        </div>

        {/* Featured post */}
        {filter === 'All' && (
          <a href={`insight-detail.html?slug=${featured.slug}`} style={{ display: 'block', textDecoration: 'none' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', borderBottom: `1px solid ${T.border}`, cursor: 'pointer' }}>
              <div style={{ background: T.ink, padding: '64px 48px' }}>
                <div style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', letterSpacing: '0.14em', textTransform: 'uppercase', color: T.accent, marginBottom: '24px' }}>Featured · {featured.tag}</div>
                <h2 style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 'clamp(32px, 4vw, 52px)', lineHeight: 1.0, letterSpacing: '-0.01em', textTransform: 'uppercase', color: '#f2ede4', marginBottom: '24px', textWrap: 'pretty' }}>{featured.title}</h2>
                <p style={{ fontFamily: "'Barlow', sans-serif", fontWeight: 300, fontSize: '14px', lineHeight: 1.8, color: 'rgba(242,237,228,0.55)', marginBottom: '40px' }}>{featured.excerpt}</p>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div style={{ display: 'flex', gap: '24px' }}>
                    <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', color: 'rgba(242,237,228,0.3)', letterSpacing: '0.1em' }}>{featured.date}</span>
                    <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', color: 'rgba(242,237,228,0.3)', letterSpacing: '0.1em' }}>{featured.readTime} read</span>
                  </div>
                  <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 600, fontSize: '12px', letterSpacing: '0.12em', textTransform: 'uppercase', color: 'rgba(242,237,228,0.5)' }}>Read →</span>
                </div>
              </div>
              <div style={{ background: T.ivory2, padding: '64px 48px', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
                <div style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', letterSpacing: '0.14em', textTransform: 'uppercase', color: T.accent, marginBottom: '16px' }}>{featured.category}</div>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 'clamp(80px, 12vw, 160px)', lineHeight: 0.85, letterSpacing: '-0.02em', color: T.border, userSelect: 'none' }}>01</div>
              </div>
            </div>
          </a>
        )}

        {/* Post grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', background: T.ivory }}>
          {rest.map((p, i) => (
            <a key={p.slug} href={`insight-detail.html?slug=${p.slug}`} style={{
              padding: '40px 48px',
              borderRight: (i % 3) < 2 ? `1px solid ${T.border}` : 'none',
              borderBottom: `1px solid ${T.border}`,
              cursor: 'pointer', transition: 'background 0.2s', textDecoration: 'none',
              display: 'flex', flexDirection: 'column',
            }}
              onMouseEnter={e => e.currentTarget.style.background = T.ivory2}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
            >
              {/* Thumbnail */}
              <div style={{ height: '160px', overflow: 'hidden', position: 'relative', flexShrink: 0 }}>
                <img src={PHOTOS[i % PHOTOS.length]} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', filter: 'grayscale(10%) brightness(0.9)' }} />
              </div>
              <div style={{ padding: '28px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px' }}>
                <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', letterSpacing: '0.12em', textTransform: 'uppercase', color: T.accent }}>{p.tag}</span>
                <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', color: T.inkLight }}>{p.readTime} read</span>
              </div>
              <h3 style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: '22px', letterSpacing: '0.02em', textTransform: 'uppercase', lineHeight: 1.15, color: T.ink, marginBottom: '16px', textWrap: 'pretty' }}>{p.title}</h3>
              <p style={{ fontFamily: "'Barlow', sans-serif", fontWeight: 300, fontSize: '13px', lineHeight: 1.75, color: T.inkMid, marginBottom: '28px', flex: 1 }}>{p.excerpt.slice(0, 120)}…</p>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', color: T.inkLight, letterSpacing: '0.1em' }}>{p.date}</span>
                <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '10px', letterSpacing: '0.12em', textTransform: 'uppercase', color: T.inkLight }}>Read →</span>
              </div>
              </div>
            </a>
          ))}
        </div>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<InsightsPage />);
</script>
<div id="root"></div>

<script>
(function() {
  // Inject hamburger toggle once DOM is ready
  function initMobileNav() {
    var nav = document.querySelector('nav');
    if (!nav || nav.dataset.mobileInit) return;
    nav.dataset.mobileInit = '1';
    var links = nav.querySelector('div:last-child');
    if (!links) return;
    links.classList.add('mobile-nav-links');
    var btn = document.createElement('button');
    btn.className = 'mobile-nav-toggle';
    btn.setAttribute('aria-label', 'Menu');
    btn.innerHTML = '<span></span><span></span><span></span>';
    btn.addEventListener('click', function() {
      links.classList.toggle('open');
    });
    // insert button before the links div
    nav.insertBefore(btn, links);
    // close on link click
    links.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() { links.classList.remove('open'); });
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(initMobileNav, 800); });
  } else {
    setTimeout(initMobileNav, 800);
  }
})();
</script>

<script src="mobile-nav.js"></script>
</body>
</html>
